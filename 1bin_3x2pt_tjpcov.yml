# Minimal 1-bin 3x2pt configuration — TJPCov Gaussian fsky covariance
#
# Same survey geometry as 1bin_3x2pt_gaus.yml, but using TJPCov's
# FourierGaussianFsky calculator for the covariance matrix.
# TJPCov propagates full tracer-level noise and bias information
# and produces a structured (block) Gaussian covariance.
#
# Note: ell_edges under cov_options.binning_info must match the
#       ell_edges used in the statistics section exactly.

general:
    ignore_scale_cuts: True

cosmo:
    Omega_c: 0.2664315
    Omega_b: 0.0491685
    h: 0.6727
    n_s: 0.9645
    sigma8: 0.831
    extra_parameters:
        camb:
            dark_energy_model: ppf
            halofit_version: takahashi

# ---------- Firecrown systematic factories ----------
Firecrown_Factory:
    TwoPointFactory:
        correlation_space: harmonic
        number_counts_factories:
            - type_source: default
              global_systematics: []
              include_rsd: false
              per_bin_systematics:
                - {type: LinearBiasSystematicFactory}
        weak_lensing_factories:
            - type_source: default
              global_systematics: []
              per_bin_systematics:
                - {type: MultiplicativeShearBiasFactory}
        cmb_factories: []
        int_options: null

# ---------- Fiducial systematic parameter values ----------
systematics:
    src0_mult_bias: 0.0
    lens0_bias: 1.5
    lens0_alphaz: 0.0
    lens0_alphag: 0.0
    lens0_z_piv: 0.0

# ---------- Source (shear) N(z) ----------
sources:
    nbins: 1
    ndens: 10          # galaxies / arcmin^2
    ellipticity_error: 0.26
    Nz_type: SourceSRD2018
    Nz_kwargs:
        Nz_alpha: 0.78
        Nz_z0: 0.13
        Nz_sigmaz: 0.05

# ---------- Lens (counts) N(z) ----------
lenses:
    nbins: 1
    ndens: 18          # galaxies / arcmin^2
    Nz_type: LensSRD2018
    Nz_kwargs:
        Nz_width: 0.3
        Nz_center: [0.4]
        Nz_sigmaz: 0.03
        Nz_alpha: 0.94
        Nz_z0: 0.26

# ---------- Two-point statistics ----------
# ell_edges must be identical to cov_options.binning_info.ell_edges
statistics:
    galaxy_density_cl:
        tracer_combs: [[0, 0]]
        ell_edges: np.geomspace(20, 2000, 11, endpoint=True)
        kmax: 0.3
    galaxy_shear_cl_ee:
        tracer_combs: [[0, 0]]
        ell_edges: np.geomspace(20, 2000, 11, endpoint=True)
        kmax: null
    galaxy_shearDensity_cl_e:
        tracer_combs: [[0, 0]]
        ell_edges: np.geomspace(20, 2000, 11, endpoint=True)
        kmax: 0.3

fiducial_sacc_path: output/1bin_tjpcov.sacc

# ---------- Covariance: TJPCov FourierGaussianFsky ----------
cov_options:
    cov_type: tjpcov
    fsky: 0.3
    IA: null            # intrinsic-alignment amplitude (null → IA off)
    binning_info:
        ell_edges: np.geomspace(20, 2000, 11, endpoint=True)

# ---------- Fisher forecast ----------
fisher:
    var_pars: ['Omega_c', 'sigma8', 'n_s', 'w0', 'wa', 'Omega_b', 'h',
               'lens0_bias', 'src0_mult_bias']
    step: 1e-2
    output: output/1bin_tjpcov_fisher.dat
    fid_output: output/1bin_tjpcov_fiducials.dat
